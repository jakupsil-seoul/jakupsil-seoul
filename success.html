<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>결제 완료 — 작업실 SEOUL</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream: #E4DAC3;
      --black: #000000;
      --gray-dark: #1a1a1a;
      --cream-border: rgba(228,218,195,0.25);
      --text-muted: #666;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--black);
      color: var(--cream);
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .hero { width:100%; position:relative; height:240px; overflow:hidden; }
    .hero-bg { width:100%; height:100%; object-fit:cover; object-position:center center; display:block; }
    .hero-overlay { position:absolute; bottom:0; left:0; right:0; height:100px; background:linear-gradient(to bottom,transparent,var(--black)); }
    .logo-wrap { width:100%; display:flex; flex-direction:column; align-items:center; padding:24px 0 20px; background:var(--black); }
    .logo-img { height:160px; width:auto; }
    .container { width:100%; max-width:480px; padding:32px 20px 80px; display:flex; flex-direction:column; gap:24px; align-items:center; }
    .loading-state { display:flex; align-items:center; gap:8px; font-size:13px; color:var(--text-muted); }
    .spinner { width:16px; height:16px; border:2px solid #333; border-top-color:var(--cream); border-radius:50%; animation:spin 0.8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .success-content { width:100%; display:none; flex-direction:column; gap:24px; align-items:center; animation:fadeUp 0.4s ease; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);} }
    .success-icon { width:72px; height:72px; border-radius:50%; background:var(--cream); display:flex; align-items:center; justify-content:center; font-size:28px; color:var(--black); animation:pop 0.4s ease; }
    @keyframes pop { 0%{transform:scale(0.5);opacity:0;}100%{transform:scale(1);opacity:1;} }
    .success-title { font-size:36px; font-weight:900; letter-spacing:2px; color:var(--cream); }
    .code-box { width:100%; background:var(--gray-dark); border:2px solid var(--cream); border-radius:16px; padding:28px 20px; text-align:center; }
    .code-kit-label { font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--text-muted); margin-bottom:6px; }
    .code-kit-name { font-size:13px; color:var(--cream); margin-bottom:16px; font-weight:500; }
    .code-number { font-size:72px; font-weight:900; letter-spacing:12px; color:var(--cream); line-height:1; margin:8px 0; }
    .code-hint { font-size:13px; color:var(--text-muted); margin-top:12px; line-height:1.7; }
    .sms-badge { background:var(--gray-dark); border:1px solid var(--cream-border); border-radius:8px; padding:12px 16px; font-size:12px; color:var(--text-muted); text-align:center; width:100%; }
    .notice { width:100%; background:#0d0d00; border-left:3px solid var(--cream); border-radius:4px; padding:14px 16px; font-size:12px; color:#999; line-height:1.9; }
    .notice strong { color:var(--cream); }
    .error-box { width:100%; background:#1a0000; border:1px solid #ff4444; border-radius:8px; padding:16px; text-align:center; font-size:13px; color:#ff6b6b; line-height:1.6; display:none; }
  </style>
</head>

<script>
  const SERVER_URL = "https://jakupsil-seoul.co.kr";

  async function confirmPayment() {
    const params = new URLSearchParams(window.location.search);
    const paymentKey = params.get("paymentKey");
    const orderId = params.get("orderId");
    const amount = params.get("amount");
    const phone = params.get("phone");
    const kit = params.get("kit");

    if (!paymentKey || !orderId || !amount) { showError(); return; }

    try {
      const res = await fetch(SERVER_URL + "/api/confirm-payment", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ paymentKey, orderId, amount: Number(amount), phone, kit }),
      });
      const data = await res.json();
      if (data.success) {
        document.getElementById("loadingState").style.display = "none";
        document.getElementById("passwordDisplay").textContent = data.password;
        document.getElementById("kitCodeDisplay").textContent = "#" + (kit || "");
        const el = document.getElementById("successState");
        el.style.display = "flex";
      } else { showError(); }
    } catch(e) { showError(); }
  }

  function showError() {
    document.getElementById("loadingState").style.display = "none";
    document.getElementById("errorState").style.display = "block";
  }

  confirmPayment();
</script>
